name: Docs

"on":
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "README.md"
      - "pyproject.toml"
      - "src/lifecore_ros2/**/*.py"
  pull_request:
    paths:
      - "docs/**"
      - "README.md"
      - "pyproject.toml"
      - "src/lifecore_ros2/**/*.py"
  workflow_dispatch: {}

permissions:
    contents: read

jobs:
    sphinx:
        runs-on: ubuntu-latest
        concurrency:
            group: ${{ github.workflow }}-${{ github.ref }}
            cancel-in-progress: true

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.12"

            - name: Set up uv
              uses: astral-sh/setup-uv@v6

            - name: Sync docs dependencies
              run: uv sync --group docs

            - name: Build Sphinx documentation
              run: uv run --group docs python -m sphinx -b html docs docs/_build/html
