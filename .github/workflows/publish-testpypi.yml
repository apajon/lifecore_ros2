name: Publish to TestPyPI

"on":
    workflow_dispatch: {}

permissions:
    contents: read

jobs:
    build-and-publish:
        runs-on: ubuntu-24.04

        permissions:
            contents: read
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: "3.12"

            - name: Set up uv
              uses: astral-sh/setup-uv@v8.1.0

            - name: Resolve PEP 440 version (strip local segment)
              id: version
              run: |
                  VERSION=$(uv run python -m setuptools_scm | sed 's/+.*//')
                  echo "value=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Build distributions
              env:
                  SETUPTOOLS_SCM_PRETEND_VERSION_FOR_LIFECORE_ROS2: ${{ steps.version.outputs.value }}
              run: uv build

            - name: Check distribution metadata
              run: uv run --with twine twine check dist/*

            - name: Publish to TestPyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  repository-url: https://test.pypi.org/legacy/
                  skip-existing: true
