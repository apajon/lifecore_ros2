name: Release

# Creates a version-bump PR against main (no direct push to protected branch).
# After merging the PR, tag and trigger publish:
#   git pull && git tag v<VERSION> && git push origin v<VERSION>
on:
    workflow_dispatch: {}

permissions:
    contents: read

jobs:
    bump:
        if: ${{ github.ref == 'refs/heads/main' }}
        runs-on: ubuntu-latest
        concurrency:
            group: ${{ github.workflow }}-release-${{ github.ref_name }}
            cancel-in-progress: false

        permissions:
            contents: write
            pull-requests: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Set up uv
              uses: astral-sh/setup-uv@v8.1.0

            - name: Sync dependencies
              run: uv sync --extra dev --group release

            # Lightweight gate: lint must pass on the release commit.
            # Full pytest requires a ROS 2 environment; run CI manually on the
            # branch before triggering this workflow (see CONTRIBUTING.md).
            - name: Lint gate
              run: |
                  uv run ruff check .
                  uv run ruff format --check .

            - name: Determine next version
              id: next_version
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # --print exits after printing; no commit/tag/push/GH outputs are set.
                  NEXT=$(uv run semantic-release version --print 2>/dev/null || true)
                  if [[ -z "${NEXT}" ]]; then
                    echo "No releasable commits since last release — aborting."
                    echo "version=" >> "$GITHUB_OUTPUT"
                  else
                    echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Bump version and update changelog locally
              if: steps.next_version.outputs.version != ''
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  # Unset GITHUB_ACTIONS so PSR does not attempt to write GHA step outputs
                  # (commit_sha etc.) which fail when PSR runs as a plain `run:` step.
                  # GITHUB_ACTIONS is protected and cannot be overridden via env:, only unset
                  # in the child shell.
                  unset GITHUB_ACTIONS
                  uv run semantic-release version --no-push --no-tag

            - name: Create release branch and open PR
              if: steps.next_version.outputs.version != ''
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION="${{ steps.next_version.outputs.version }}"
                  BRANCH="release/bump-v${VERSION}"
                  git checkout -b "${BRANCH}"
                  git push --force-with-lease origin "${BRANCH}"
                  printf 'Automated changelog update for `v%s`.\n\nAfter merging, push the tag to trigger the publish workflow:\n\n```bash\ngit pull && git tag v%s && git push origin v%s\n```\n' \
                    "${VERSION}" "${VERSION}" "${VERSION}" > /tmp/pr_body.md
                  gh pr create \
                    --title "chore(release): bump to v${VERSION}" \
                    --body-file /tmp/pr_body.md \
                    --base main \
                    --head "${BRANCH}"
