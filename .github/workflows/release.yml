name: Release

# Creates a version-bump PR against main (no direct push to protected branch).
# After merging the PR, tag and trigger publish:
#   git pull && git tag v<VERSION> && git push origin v<VERSION>
on:
    workflow_dispatch: {}

permissions:
    contents: read

jobs:
    bump:
        if: ${{ github.ref == 'refs/heads/main' }}
        runs-on: ubuntu-latest
        concurrency:
            group: ${{ github.workflow }}-release-${{ github.ref_name }}
            cancel-in-progress: false

        permissions:
            contents: write
            pull-requests: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Set up uv
              uses: astral-sh/setup-uv@v8.1.0

            - name: Sync dependencies
              run: uv sync --extra dev --group release

            # Lightweight gate: lint must pass on the release commit.
            # Full pytest requires a ROS 2 environment; run CI manually on the
            # branch before triggering this workflow (see CONTRIBUTING.md).
            - name: Lint gate
              run: |
                  uv run ruff check .
                  uv run ruff format --check .

            - name: Determine next version
              id: next_version
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # --print exits after printing; no commit/tag/push/GH outputs are set.
                  NEXT=$(uv run semantic-release version --print 2>/dev/null || true)
                  if [[ -z "${NEXT}" ]]; then
                    echo "No releasable commits since last release — aborting."
                    echo "version=" >> "$GITHUB_OUTPUT"
                  else
                    echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Update CHANGELOG for next release
              if: steps.next_version.outputs.version != ''
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # Writes the unreleased changelog section into CHANGELOG.md locally;
                  # does not commit, tag, push, or call the GitHub releases API.
                  uv run semantic-release changelog

            - name: Create release branch and open PR
              if: steps.next_version.outputs.version != ''
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  VERSION="${{ steps.next_version.outputs.version }}"
                  BRANCH="release/bump-v${VERSION}"
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git checkout -b "${BRANCH}"
                  git add CHANGELOG.md
                  git commit -m "chore(release): update changelog for v${VERSION}"
                  git push --force origin "${BRANCH}"
                  gh pr create \
                    --title "chore(release): bump to v${VERSION}" \
                    --body "Automated changelog update for \`v${VERSION}\`.\n\nAfter merging, push the tag to trigger the publish workflow:\n\`\`\`bash\ngit pull && git tag v${VERSION} && git push origin v${VERSION}\n\`\`\`" \
                    --base main \
                    --head "${BRANCH}"
