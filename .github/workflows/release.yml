name: Release

# Manual dispatch only — do not restore the cron schedule until the release
# flow has been rehearsed end-to-end at least once (see TODO.md, section 1).
on:
    workflow_dispatch: {}

permissions:
    contents: read

jobs:
    release:
        if: ${{ github.ref == 'refs/heads/main' }}
        runs-on: ubuntu-latest
        concurrency:
            group: ${{ github.workflow }}-release-${{ github.ref_name }}
            cancel-in-progress: false

        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Set up uv
              uses: astral-sh/setup-uv@v8.1.0

            - name: Sync dev dependencies
              run: uv sync --extra dev --group release

            # Lightweight gate: lint must pass on the release commit.
            # Full pytest requires a ROS 2 environment; run CI manually on the
            # branch before triggering this workflow (see CONTRIBUTING.md).
            - name: Lint gate
              run: |
                  uv run ruff check .
                  uv run ruff format --check .

            - name: Run Python Semantic Release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  uv run semantic-release version
                  uv run semantic-release publish
