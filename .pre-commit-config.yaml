repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-yaml

- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.11.8
  hooks:
  - id: ruff
    args: [ --fix ]
  - id: ruff-format

- repo: https://github.com/RobertCraigie/pyright-python
  rev: v1.1.408
  hooks:
  - id: pyright
    name: Pyright Type Checking
    entry: pyright
    language: python
    types: [ python ]

- repo: local
  hooks:
  - id: validate-customization-frontmatter
    name: Validate customization frontmatter
    entry: uv run scripts/validate_customization_frontmatter.py
    language: python
    additional_dependencies: [ pyyaml ]
    files: ^tools\/copilot\/(agents|prompts|instructions)\/.*\.(agent|prompt|instructions)\.md$
